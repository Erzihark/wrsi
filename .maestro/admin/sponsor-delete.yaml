# Admin deletes a sponsor/ally: it goes through the themed confirm dialog,
# reports a toast, and disappears from the list immediately (no app reload).
# Same coverage shape as high-school-delete.yaml (ConfirmProvider + the
# stale-list refetch on the delete path), but sponsors_and_allies isn't
# login-backed so there's no delete-entity Edge Function involved — this is a
# direct table delete.
#
# Self-contained: creates a fresh sponsor, then deletes it.
#
# Prereqs & device-verified conventions: see sponsor-create.yaml. In short: run
# against a standalone build; the form is long (scrollUntilVisible before
# submit/delete); react-hook-form needs a field blur before submit enables.
appId: com.wxstudy.wrsi
tags:
  - admin
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/login.yaml
    env:
      EMAIL: "admin@wrsi.dev"
      PASSWORD: "password123"
- assertVisible:
    id: "admin-tab-students"

# Unique per run so re-runs don't collide/clutter the list.
- evalScript: ${output.stamp = Date.now()}

- tapOn:
    id: "admin-tab-sponsors"

# --- Create the sponsor we're going to delete ---
- tapOn:
    id: "admin-add-sponsor"
- tapOn:
    id: "sponsor-name-input"
- inputText: "E2E Sponsor ${output.stamp}"
- hideKeyboard
- tapOn:
    id: "sponsor-email-input"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "entity-submit"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "entity-submit"
- assertVisible: "E2E Sponsor ${output.stamp}"

# --- Delete it ---
# Filter the list to the single row we just created so the shared per-row Edit
# button (same id on every row) is unambiguous.
- tapOn:
    id: "admin-sponsor-search"
- inputText: "${output.stamp}"
- hideKeyboard
- tapOn:
    id: "sponsor-edit"

- scrollUntilVisible:
    element:
      id: "entity-delete"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "entity-delete"
# The themed ConfirmProvider dialog (not a native Alert) gates the destructive
# action; confirm it.
- tapOn:
    id: "confirm-dialog-confirm"

# Back on the (still search-filtered) list: the row must be gone without any
# manual reload. With the filter still applied to the deleted name, the list is
# now empty for that term.
- assertNotVisible: "E2E Sponsor ${output.stamp}"
